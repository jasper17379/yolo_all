# 全局配置
project_root: .
device: auto  # auto | cpu | cuda | cuda:0 | 0 | 0,1

default_yolo_version: yolov8

train:
  epochs: 20
  batch: 8
  imgsz: 640
  patience: 50
  workers: 4
  lr0: 0.01
  lrf: 0.01
  optimizer: auto
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  mosaic: 1.0
  cos_lr: false
  amp: true
  freeze: null
  seed: 0
  close_mosaic: 10

infer:
  conf: 0.25
  iou: 0.45
  imgsz: 640
  half: false

paths:
  datasets: datasets
  weights: weights
  runs: runs
  face_gallery: datasets/face/gallery
  custom_data: datasets/custom

tasks:
  helmet:
    type: detection
    classes: [no_helmet, helmet]
    default_weights: yolov8n.pt
  plate:
    type: detection
    classes: [plate]
    default_weights: yolov8n.pt
  action:
    type: detection
    classes: [normal, smoking, fighting, falling]
    default_weights: yolov8n.pt
  face:
    type: recognition
    model: buffalo_l
    max_images_per_person: 20
